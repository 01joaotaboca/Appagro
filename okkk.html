<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a4373">
    <title>Agro Pro - João Divino Barbosa ®</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary:#1a4373; --bg:#f0f2f5; --warning:#f39c12; --danger:#e74c3c; --success:#25d366; --dark-card: #2c3e50; --text-muted: #5a6e7c; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background:var(--bg); padding:12px; margin:0; padding-bottom: 40px; }
        .card { background:white; padding:18px; border-radius:18px; box-shadow:0 6px 15px rgba(0,0,0,0.1); margin-bottom:16px; border-left:6px solid var(--primary); }
        h2 { font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px; font-weight:800; display:flex; align-items:center; gap:6px; }
        input, textarea { width:100%; padding:14px; margin-bottom:10px; border:2px solid #e2e8f0; border-radius:12px; font-size:16px; font-weight:600; outline: none; }
        .row { display:flex; gap:10px; }
        button { width:100%; padding:16px; border:none; border-radius:40px; font-weight:bold; font-size:15px; color:white; margin-bottom:8px; cursor:pointer; transition: 0.2s; }
        .card-medicao { background: var(--dark-card); color: white; border-left-color: #1abc9c; }
        .card-medicao input { background: #34495e; border: none; color: #1abc9c; font-size: 24px; text-align: center; }
        .card-manutencao { border-left-color: var(--warning); background: #fffdf0; }
        .btn-manut { background: var(--warning); }
        .btn-manut.ativo { background: #d35400; }
        .st-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-top: 5px; }
        .st-ok { background: #dcfce7; color: #166534; }
        .st-erro { background: #fee2e2; color: #b32d2e; }
        .hidden { display: none; }
        footer { text-align:center; font-size:10px; margin:20px; color:#94a3b8; font-weight: bold; }
    </style>
</head>
<body onload="carregarDados()">

<div class="card">
    <h2>📋 1. IDENTIFICAÇÃO</h2>
    <input id="fazenda" placeholder="Fazenda" oninput="salvar()">
    <input id="talhao" placeholder="Talhão" oninput="salvar()">
    <div class="row">
        <input id="op" placeholder="Operador" oninput="salvar()" style="flex:2">
        <input id="numMaq" placeholder="Nº Máquina" oninput="salvar()" style="flex:1">
    </div>
</div>

<div class="card card-medicao">
    <h2>📊 2. HORÍMETRO</h2>
    <div class="row">
        <div style="flex:1">
            <span style="font-size:10px; color:#1abc9c;">INICIAL</span>
            <input type="number" id="vI" step="0.1" oninput="salvar()">
        </div>
        <div style="flex:1">
            <span style="font-size:10px; color:#1abc9c;">FINAL</span>
            <input type="number" id="vF" step="0.1" oninput="salvar()">
        </div>
    </div>
    <div style="text-align: center; margin-top: 10px;">
        <span id="totMaqVisual" style="font-size: 26px; font-weight: 900;">0.00</span>
        <div id="statusAnalise"></div>
        <div id="msgTrava" style="font-size: 9px; color: #1abc9c; margin-top: 5px;"></div>
    </div>
</div>

<div class="card card-manutencao">
    <h2>🛠️ 3. MANUTENÇÃO (ECONOMIA DE BATERIA)</h2>
    <button id="btnManut" class="btn-manut" onclick="alternarManutencao()">🔧 INICIAR MANUTENÇÃO</button>
    <div id="infoManut" class="hidden">
        <div style="text-align:center; margin:10px 0;">
            <span id="tempoManut" style="font-size:16px; font-weight:bold; color:#d35400;">Pausado em Manutenção...</span>
        </div>
        <textarea id="justManut" placeholder="O que foi feito?" oninput="salvar()"></textarea>
    </div>
</div>

<div class="card">
    <h2>⏱️ 4. JORNADA</h2>
    <div class="row" style="text-align:center">
        <div style="flex:1"><label style="font-size:9px;">INÍCIO</label><input id="sIni" readonly style="border:none; text-align:center;"></div>
        <div style="flex:1"><label style="font-size:9px;">FIM</label><input id="sFim" readonly style="border:none; text-align:center;"></div>
    </div>
    <button style="background:#1a4373" onclick="marcar('ini')">▶ ABRIR DIA</button>
    <button style="background:#475569" onclick="marcar('fim')">⏹️ FECHAR DIA</button>
    <div style="background:#eef2ff; padding:10px; border-radius:12px; text-align:center; margin-top:10px;">
        <span id="tSist" style="font-weight:900; color:#1a4373; font-size:18px;">Tempo Líquido: 0h 0min</span>
    </div>
</div>

<div class="card">
    <button style="background:#e74c3c" onclick="gerarPDF()">📄 PDF PROFISSIONAL</button>
    <button style="background:#25d366" onclick="enviarWA()">📱 WHATSAPP</button>
    <button onclick="limparTudo()" style="background:#95a5a6; font-size:10px; padding:5px;">🔄 RESETAR</button>
</div>

<footer>Desenvolvido por João Divino Barbosa ®</footer>

<script>
let dados = { ini: null, fim: null };
let ultimaMedicaoFinal = 0;
let emManutencao = false;
let tempoInicioManut = null; // Apenas salva o "ponto" no tempo
let totalTempoManutAcumulado = 0;

function salvar() {
    let obj = {
        fazenda: fazenda.value, talhao: talhao.value, op: op.value, numMaq: numMaq.value,
        vI: vI.value, vF: vF.value, sIni: sIni.value, sFim: sFim.value,
        logica: dados, trava: ultimaMedicaoFinal,
        emManutencao, tempoInicioManut, totalTempoManutAcumulado,
        justManut: justManut.value
    };
    localStorage.setItem('agropro_v4_data', JSON.stringify(obj));
    calcular();
}

function carregarDados() {
    let s = JSON.parse(localStorage.getItem('agropro_v4_data') || '{}');
    ultimaMedicaoFinal = s.trava || 0;
    vI.value = s.vI || (ultimaMedicaoFinal > 0 ? ultimaMedicaoFinal : '');
    fazenda.value = s.fazenda || ''; talhao.value = s.talhao || ''; op.value = s.op || ''; numMaq.value = s.numMaq || '';
    vF.value = s.vF || ''; sIni.value = s.sIni || ''; sFim.value = s.sFim || '';
    dados = s.logica || { ini: null, fim: null };
    emManutencao = s.emManutencao || false;
    tempoInicioManut = s.tempoInicioManut || null;
    totalTempoManutAcumulado = s.totalTempoManutAcumulado || 0;
    justManut.value = s.justManut || '';

    if(ultimaMedicaoFinal > 0) msgTrava.innerText = `🔒 ÚLTIMO FECHAMENTO: ${ultimaMedicaoFinal}`;
    atualizarInterfaceManut(emManutencao);
    calcular();
}

function marcar(t) {
    if(t === 'ini') {
        dados.ini = new Date().getTime();
        sIni.value = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        sFim.value = ""; dados.fim = null;
    } else {
        if (!dados.ini) return alert("Inicie o dia!");
        dados.fim = new Date().getTime();
        sFim.value = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        ultimaMedicaoFinal = parseFloat(vF.value) || 0;
        if(emManutencao) alternarManutencao();
    }
    salvar();
}

function alternarManutencao() {
    let agora = new Date().getTime();
    if (!emManutencao) {
        emManutencao = true;
        tempoInicioManut = agora; // Salva o momento que parou
    } else {
        // Quando volta da manutenção, ele calcula a diferença entre o AGORA e o INICIO salvo
        totalTempoManutAcumulado += (agora - tempoInicioManut);
        emManutencao = false;
        tempoInicioManut = null;
    }
    atualizarInterfaceManut(emManutencao);
    salvar();
}

function atualizarInterfaceManut(ativo) {
    btnManut.innerText = ativo ? "⏹️ FINALIZAR MANUTENÇÃO" : "🔧 INICIAR MANUTENÇÃO";
    btnManut.className = ativo ? "btn-manut ativo" : "btn-manut";
    infoManut.classList.toggle('hidden', !ativo);
}

function calcular() {
    let agora = dados.fim || new Date().getTime();
    let tempoBrutoMs = dados.ini ? (agora - dados.ini) : 0;
    
    // Se estiver em manutenção agora, calcula o tempo atual desde o início da parada
    let mAtual = (emManutencao && !dados.fim) ? (new Date().getTime() - tempoInicioManut) : 0;
    let totalM = totalTempoManutAcumulado + mAtual;
    
    let liqMs = Math.max(0, tempoBrutoMs - totalM);
    
    tSist.innerHTML = `Tempo Líquido: ${Math.floor(liqMs/3600000)}h ${Math.floor((liqMs%3600000)/60000)}min`;
    
    let totalMaq = Math.max(0, (parseFloat(vF.value)||0) - (parseFloat(vI.value)||0));
    totMaqVisual.innerText = totalMaq.toFixed(2);
}

function enviarWA() {
    let msg = `*RELATÓRIO AGRO PRO ®*\n📍 *Fazenda:* ${fazenda.value}\n🚜 *Máq:* ${numMaq.value}\n⚙️ *Horímetro:* ${vI.value} -> ${vF.value}\n⏱️ *${tSist.innerText}*\n📝 *Motivo Parada:* ${justManut.value || 'Nenhuma'}\n_João Divino Barbosa ®_`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    // Cabeçalho Profissional
    doc.setFillColor(26, 67, 115); doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(255, 255, 255); doc.setFontSize(20); doc.text("RELATÓRIO TRABALHO DIARIO", 105, 20, {align:"center"});
    doc.setFontSize(10); doc.text(`Desenvolvido por João Divino Barbosa ®`, 105, 30, {align:"center"});
    
    // Corpo
    doc.setTextColor(0,0,0); doc.setFontSize(12);
    doc.text(`Fazenda: ${fazenda.value}`, 20, 55);
    doc.text(`Operador: ${op.value} | Máquina: ${numMaq.value}`, 20, 65);
    doc.line(20, 70, 190, 70);
    doc.text(`Horímetro: ${vI.value} -> ${vF.value} (Total: ${totMaqVisual.innerText}h)`, 20, 80);
    doc.text(`${tSist.innerText}`, 20, 90);
    doc.text(`Justificativa de Parada: ${justManut.value || 'N/A'}`, 20, 100);
    
    doc.text("Assinatura do Responsável", 105, 260, {align:"center"});
    doc.line(60, 255, 150, 255);
    doc.save(`Relatorio_${fazenda.value}.pdf`);
}

function limparTudo() { if(confirm("Limpar dados?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
