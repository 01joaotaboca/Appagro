<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Satélite PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#0d1117;color:#fff;height:100vh;display:flex;flex-direction:column;}

#header{
  background:#111827;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  gap:8px;
  border-bottom:2px solid #1f2937;
}

#header h1{font-size:15px;}

#controls{display:flex;gap:6px;flex-wrap:wrap;}

button{
  padding:7px 12px;
  border-radius:8px;
  border:none;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
}

#btn-gps{background:#1f2937;color:#00e5ff;border:1px solid #00e5ff;}
#btn-follow{background:#1f2937;color:#ffd166;border:1px solid #ffd166;}
#btn-sat{background:#1f2937;color:#00ff88;border:1px solid #00ff88;}
#btn-hib{background:#1f2937;color:#ff6b6b;border:1px solid #ff6b6b;}
#btn-map{background:#1f2937;color:#aaa;border:1px solid #aaa;}

#coords{
  font-size:11px;
  color:#aaa;
  background:#020617;
  padding:4px 8px;
  border-radius:6px;
}

#map{flex:1;}

.meu-ponto{
  background:#00e5ff;
  border:3px solid #fff;
  border-radius:50%;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 6px #00e5ff;}
  50%{box-shadow:0 0 18px #00e5ff;}
  100%{box-shadow:0 0 6px #00e5ff;}
}

#footer{
  text-align:center;
  font-size:10px;
  padding:4px;
  background:#020617;
  color:#666;
}
</style>
</head>

<body>

<div id="header">
  <h1>🛰️ Satélite PRO</h1>

  <div id="controls">
    <div id="coords">---</div>
    <button id="btn-gps" onclick="localizar()">📍 GPS</button>
    <button id="btn-follow" onclick="toggleFollow()">🎯 Seguir</button>
    <button id="btn-sat" onclick="trocar('sat')">Satélite</button>
    <button id="btn-hib" onclick="trocar('hib')">Híbrido</button>
    <button id="btn-map" onclick="trocar('map')">Mapa</button>
  </div>
</div>

<div id="map"></div>

<div id="footer">
Desenvolvido por João Divino Barbosa
</div>

<script>

var map = L.map('map').setView([-15,-55],4);

// CAMADAS
var sat = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:21}
);

var mapNormal = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
);

var hib = L.layerGroup([
sat,
L.tileLayer('https://stamen-tiles.a.ssl.fastly.net/toner-lines/{z}/{x}/{y}.png',{opacity:0.6})
]);

var atual = sat.addTo(map);

// GPS
var marker, circle;
var follow = false;
var watchID = null;
var linha = L.polyline([], {color:"#00e5ff"}).addTo(map);

// TROCAR MAPA
function trocar(tipo){
  map.removeLayer(atual);

  if(tipo==='sat') atual = sat;
  if(tipo==='map') atual = mapNormal;
  if(tipo==='hib') atual = hib;

  atual.addTo(map);
}

// ATUALIZA COORD
function coord(lat,lng){
  document.getElementById('coords').innerText =
  lat.toFixed(6)+','+lng.toFixed(6);
}

// GPS 1X
function localizar(){
  navigator.geolocation.getCurrentPosition(pos=>{
    atualizar(pos);
    map.setView([pos.coords.latitude,pos.coords.longitude],18);
  });
}

// SEGUIR
function toggleFollow(){
  follow = !follow;

  if(follow){
    watchID = navigator.geolocation.watchPosition(atualizar);
  }else{
    navigator.geolocation.clearWatch(watchID);
  }
}

// ATUALIZA POSIÇÃO
function atualizar(pos){
  let lat = pos.coords.latitude;
  let lng = pos.coords.longitude;
  let acc = pos.coords.accuracy;

  coord(lat,lng);

  if(marker) map.removeLayer(marker);
  if(circle) map.removeLayer(circle);

  let icon = L.divIcon({className:'meu-ponto',iconSize:[16,16]});

  marker = L.marker([lat,lng],{icon:icon}).addTo(map);

  circle = L.circle([lat,lng],{
    radius:acc,
    color:"#00e5ff",
    fillOpacity:0.2
  }).addTo(map);

  linha.addLatLng([lat,lng]);

  if(follow){
    map.setView([lat,lng]);
  }
}

</script>
</body>
</html>
