<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Satélite PRO REAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    body { margin:0; padding:0; overflow:hidden; background:#1a1a1a; font-family: Arial, sans-serif; }
    #map { height:100vh; width:100vw; z-index:1; background:#1a1a1a; }

    .painel {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        max-width: 380px;
        z-index: 1000;
        background: rgba(18, 18, 18, 0.98);
        padding: 15px;
        border-radius: 12px;
        color: #fff;
        box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        border: 1px solid rgba(255,255,255,0.1);
    }

    #coords {
        font-family: monospace;
        margin-bottom: 12px;
        font-size: 16px;
        color: #4ed8e6;
        font-weight: bold;
        text-align: center;
        letter-spacing: 1px;
    }

    button {
        width: 100%;
        margin-bottom: 8px;
        padding: 14px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        text-transform: uppercase;
        transition: 0.2s;
    }

    .gps { background: #00bcd4; color: #000; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,188,212,0.3); }
    .data { background: #4caf50; color: #fff; }
    .label-historico { font-size: 12px; color: #aaa; margin-bottom: 8px; display: block; text-align: center; }
</style>
</head>

<body>

<div class="painel">
    <div id="coords">LOCALIZANDO GPS...</div>
    
    <button class="gps" onclick="irGPS()">MINHA LOCALIZAÇÃO (GPS)</button>
    
    <span class="label-historico">Histórico Sentinel (Imagens Reais):</span>
    
    <button class="data" onclick="mudarData('2025-01-01/2025-03-25')">JANEIRO 2025</button>
    <button class="data" onclick="mudarData('2024-01-01/2024-05-01')">JANEIRO 2024</button>
    <button class="data" onclick="mudarData('2023-01-01/2023-05-01')">JANEIRO 2023</button>
</div>

<div id="map"></div>

<script>
// Coordenadas iniciais do seu print
var inicial = [-3.419348, -43.464929];
var map = L.map('map', { zoomControl: false }).setView(inicial, 16);

L.control.zoom({ position: 'topright' }).addTo(map);

// MAPA BASE - ArcGIS Satélite (Usando link direto mais estável)
var base = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19,
    attribution: 'Esri'
}).addTo(map);

var sentinel;

function mudarData(periodo) {
    if (sentinel) map.removeLayer(sentinel);

    // Ajuste na URL do Sentinel para evitar o erro de carregamento
    sentinel = L.tileLayer.wms("https://services.sentinel-hub.com/ogc/wms/0b080447-0e6e-4775-9e67-00c7336f33d5", {
        layers: "TRUE_COLOR",
        format: "image/png",
        transparent: true,
        time: periodo,
        maxcc: 30, // Aceita até 30% de nuvens para garantir que a imagem apareça
        version: '1.1.1',
        maxZoom: 18
    }).addTo(map);
}

var marker;

function irGPS() {
    if (!navigator.geolocation) return alert("Sem suporte a GPS");

    navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;
        var acc = pos.coords.accuracy;

        if (marker) map.removeLayer(marker);

        marker = L.circleMarker([lat, lng], {
            radius: 8, color: '#fff', fillColor: '#00e5ff', fillOpacity: 1, weight: 2
        }).addTo(map);

        map.flyTo([lat, lng], 17);
        document.getElementById("coords").innerText = lat.toFixed(6) + ", " + lng.toFixed(6) + " (±" + Math.round(acc) + "m)";
    }, function(err) {
        alert("Erro ao localizar. Verifique o GPS.");
    }, { enableHighAccuracy: true });
}

// Inicia com a localização do print
document.getElementById("coords").innerText = inicial[0] + ", " + inicial[1] + " (±2m)";
mudarData('2025-01-01/2025-03-25');

</script>
</body>
</html>
