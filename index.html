<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satélite PRO REAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.painel {
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
    background:#111;
    padding:10px;
    border-radius:10px;
    color:#fff;
}

button {
    margin:3px;
    padding:8px;
    border:none;
    border-radius:6px;
    font-weight:bold;
}

.gps { background:#00bcd4; color:#000; }
.data { background:#4caf50; color:#fff; }
</style>
</head>

<body>

<div class="painel">
    <div id="coords">---</div>
    <button class="gps" onclick="irGPS()">GPS</button><br>

    <button class="data" onclick="mudarData('2025-01-01')">2025</button>
    <button class="data" onclick="mudarData('2024-01-01')">2024</button>
    <button class="data" onclick="mudarData('2023-01-01')">2023</button>
</div>

<div id="map"></div>

<script>
var map = L.map('map').setView([-3.36, -43.51], 15);

// BASE (satélite padrão)
var base = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
base.addTo(map);

// CAMADA SENTINEL (real)
var sentinel;

function mudarData(data) {

    if (sentinel) {
        map.removeLayer(sentinel);
    }

    sentinel = L.tileLayer.wms(
        "https://services.sentinel-hub.com/ogc/wms/public",
        {
            layers: "TRUE_COLOR",
            format: "image/png",
            transparent: true,
            time: data
        }
    ).addTo(map);
}

// GPS REAL
var marker;

function irGPS() {
    navigator.geolocation.getCurrentPosition(
        function(pos) {

            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            var acc = pos.coords.accuracy;

            var latlng = [lat, lng];

            if (marker) {
                map.removeLayer(marker);
            }

            marker = L.circleMarker(latlng, {
                radius:8,
                color:"#00ffff",
                fillColor:"#00ffff",
                fillOpacity:1
            }).addTo(map);

            map.setView(latlng, 18);

            document.getElementById("coords").innerText =
                lat.toFixed(6) + "," + lng.toFixed(6) +
                " (±" + Math.round(acc) + "m)";
        },
        function(err) {
            alert("Erro GPS: " + err.message);
        },
        {
            enableHighAccuracy:true,
            maximumAge:0,
            timeout:10000
        }
    );
}

// inicia com imagem atual
mudarData("2025-01-01");

</script>

</body>
</html>
